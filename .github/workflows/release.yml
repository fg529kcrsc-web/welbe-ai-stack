name: Reviewed Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver tag to release, for example v1.2.3"
        required: true
        type: string
      approved_pr:
        description: "Merged, approved PR number whose merge commit is being released"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Verify and draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

      - name: Verify signed commit and approved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          APPROVED_PR: ${{ inputs.approved_pr }}
        run: bash scripts/ci/check-release-source.sh

      - name: Draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "$VERSION" \
            --target "$RELEASE_SHA" \
            --title "$VERSION" \
            --generate-notes \
            --draft
